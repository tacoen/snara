<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Story Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- Left Vertical Nav (40px wide) -->
  <nav>
    <div class="nav-top">
      <button id="bookindex-btn" onclick="bookIndex()" title="Book index" aria-label="Book index">
        <i data-icon="t-shelf"></i>
      </button>
    </div>
    <div class="nav-bottom">
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme"></button>
      <button id="settings-btn" onclick="openSettings()" title="Settings" aria-label="Settings">
        <i data-icon="t-cog"></i>
      </button>
    </div>
  </nav>

<header>
    <div class="header-left">
      <button id="chapterIndex-btn" onclick="chapterIndex()" title="Chapter index" aria-label="Chapter index">
        <i data-icon="t-book"></i>
      </button>
      <div class="filename">
        <span id="active-book-label" class="book-label">—</span>
        <span class="filename-sep">/</span>
        <span id="filename" contenteditable spellcheck="false" data-placeholder="untitled"></span>
      </div>
    </div>

    <button id="save-btn" onclick="saveDocument()" title="Save (Ctrl+S)" aria-label="Save document">
      <i data-icon="t-save"></i>
      <span class="save-label">save</span>
    </button>

    <ul class="tabmenu">
      <li class="active" data-tab="editor">Editor</li>
      <li data-tab="meta">Meta</li>
      <li data-tab="files">Files</li>
    </ul>
  </header>


  <!-- Main Dashboard -->
  <div class="dashboard">
	  
    <!-- Center Content -->
    <main class="content-area">

      <article id="article">
        <div class="entries">

		
		
		
		</div>

        <div class="meta" hidden>
          <div class="meta-fields">
            <div class="meta-field">
              <span class="field-key" contenteditable spellcheck="false">characters</span>
              <span class="field-sep">:</span>
              <span class="field-val" contenteditable spellcheck="false"></span>
              <button class="field-remove" onclick="removeField(this)" title="Remove field">✕</button>
            </div>
            <div class="meta-field">
              <span class="field-key" contenteditable spellcheck="false">settings</span>
              <span class="field-sep">:</span>
              <span class="field-val" contenteditable spellcheck="false"></span>
              <button class="field-remove" onclick="removeField(this)" title="Remove field">✕</button>
            </div>
            <div class="meta-field">
              <span class="field-key" contenteditable spellcheck="false">prompts</span>
              <span class="field-sep">:</span>
              <span class="field-val" contenteditable spellcheck="false"></span>
              <button class="field-remove" onclick="removeField(this)" title="Remove field">✕</button>
            </div>
          </div>
          <button class="add-field-btn" onclick="addField()">+ add field</button>
        </div>
      </article>
	  
    <!-- Editor Area - kept exactly like your original -->
    <div class="editor-area">
      <div class="toolbar-row">
        <button class="tb-btn" onclick="fmt('bold')" title="Bold"><b>B</b></button>
        <button class="tb-btn" onclick="fmt('italic')" title="Italic"><i>I</i></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="wrapMd('# ')" title="Heading 1">H1</button>
        <button class="tb-btn" onclick="wrapMd('## ')" title="Heading 2">H2</button>
        <button class="tb-btn" onclick="wrapMd('### ')" title="Heading 3">H3</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="wrapInline('`','`')" title="Inline code">⌥</button>
        <button class="tb-btn" onclick="wrapMd('> ')" title="Blockquote">"</button>
        <button class="tb-btn" onclick="wrapMd('- ')" title="List item">—</button>
        <span class="hint">ctrl+enter to post</span>
      </div>

      <div id="editor" contenteditable="true" data-placeholder="Write something…"></div>

      <div class="submit-row">
        <div class="tag-pills">
          <span class="tag-label">class:</span>
          <button class="tag-pill" data-tag="beat"    onclick="setTag('beat')">beat</button>
          <button class="tag-pill" data-tag="scene"   onclick="setTag('scene')">scene</button>
          <button class="tag-pill" data-tag="chapter" onclick="setTag('chapter')">chapter</button>
          <button class="tag-pill" data-tag="act"     onclick="setTag('act')">act</button>
        </div>
        <button class="submit-btn" onclick="submitEntry()">post →</button>
      </div>
    </div>

	  



    </main>

    <!-- Future Panel -->
    <aside class="future-panel">
      -- future implement --
    </aside>

  </div>
</div>

<!-- Popup Toolbar -->
<div class="popup-toolbar" id="popup">
  <button class="pop-pill beat"    onclick="setEntryClass('beat')">beat</button>
  <button class="pop-pill scene"   onclick="setEntryClass('scene')">scene</button>
  <button class="pop-pill chapter" onclick="setEntryClass('chapter')">chapter</button>
  <button class="pop-pill act"     onclick="setEntryClass('act')">act</button>
  <div class="pop-sep"></div>
  <button class="pop-pill pop-remove" onclick="removeEntry()" title="Delete entry">✕</button>
</div>

<!-- Settings Overlay -->
<div class="app-overlay" id="settings-overlay"></div>

<!-- Settings Modal -->
<div class="app-modal" id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
  <div class="modal-header">
    <span class="modal-title" id="settings-title"><i data-icon="t-cog"></i> Settings</span>
    <button class="modal-close" onclick="window.settingsInst?.close()" title="Close">
      <i data-icon="x"></i>
    </button>
  </div>

  <div class="modal-body" id="settings-body">
    <!-- rendered by SnaraSettings._render() -->
    <div class="cfg-loading">loading config…</div>
  </div>

  <div class="modal-footer">
    <button class="cfg-btn cfg-btn-ghost" onclick="window.settingsInst?.close()">cancel</button>
    <button class="cfg-btn cfg-btn-primary" id="cfg-save-btn" onclick="window.settingsInst?.save()">save</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script type="module" src="js/snara.js"></script>
</body>
</html>
