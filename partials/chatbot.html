<div class="chatbot" id="chatbot-root">

  <header class="chatbot__header">
    <div>
      <i data-icon="ai-agents"></i>
	<span class="chatbot__title">AI Assistant</span>
    </div>
	<button class="btn-icon cfg-btn" id="chatbot-clear"
            title="Clear conversation" aria-label="Clear conversation">
      <i data-icon="trash"></i>
    </button>
  </header>

  <div class="chatbot__window" id="chatbot-window"
       role="log" aria-live="polite" aria-label="Chat messages">
  </div>

  <div class="chatbot__composer">
    <select class="chatbot__select" id="chatbot-preprompt" aria-label="Prompt preset">
      <option value="">Default</option>
    </select>
    <input  class="chatbot__input"  id="chatbot-input"
            type="text" placeholder="Type a message…"
            autocomplete="off" aria-label="Message" />
    <button class="chatbot__send"   id="chatbot-send" aria-label="Send">Send</button>
  </div>

<aside class="chat-side">
not yet
</aside>

</div>
