<div id='files'>

  <nav id="files-nav" class='embed'>
    <div class="fnav-group-label">Workspace</div>
    <button class="fnav-item active" data-section="import" onclick="SnaraFiles.instance.switchSection('import')">
      <i data-icon="folder-bolt"></i> Import
    </button>
    <button class="fnav-item" data-section="export" onclick="SnaraFiles.instance.switchSection('export')">
      <i data-icon="folder-share"></i> Export
    </button>
    <button class="fnav-item" data-section="gallery" onclick="SnaraFiles.instance.switchSection('gallery')">
      <i data-icon="library-photo"></i> Gallery
    </button>
    <div class="fnav-group-label">System</div>
    <button class="fnav-item" data-section="cache" onclick="SnaraFiles.instance.switchSection('share')">
      <i data-icon="folder"></i> File(s)
    </button>	
    <button class="fnav-item" data-section="cache" onclick="SnaraFiles.instance.switchSection('cache')">
      <i data-icon="archive"></i> Cache
    </button>
  </nav>

  <div id="files-main">

    <header class='toolbar'>
      <span id="files-section-title" class="title">Import</span>
      <div id="files-topbar-actions"></div>
    </header>

    <!-- Import -->
    <div id="fpanel-import" class="fpanel">

      <div id="files-dropzone" onclick="SnaraFiles.instance._triggerInput('files-input')">
        <i data-icon="upload"></i>
        <p>Drop <b>.txt</b> or <b>.md</b> files here</p>
        <span>or click to browse</span>
      </div>
      <input type="file" id="files-input" accept=".txt,.md" multiple hidden>

      <ul id="files-imp-list" class="flist"></ul>

      <div id="files-delete-bar" class="fdelete-bar" hidden>
        <p id="files-delete-count"></p>
        <div class="fdelete-actions">
          <button class="btn-mini mute" onclick="SnaraFiles.instance.clearDeletes('import')">Cancel</button>
          <button class="btn-mini btn-mini-danger" onclick="SnaraFiles.instance.applyDeletes('import')">Delete marked</button>
        </div>
      </div>
    </div>

    <!-- Export -->
     <div id="fpanel-export" class="fpanel" hidden>
      <div class="fpanel-hint" style="display:flex;align-items:center;gap:8px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:var(--f-xs)">
          <input type="checkbox" id="files-exp-all" checked
            style="accent-color:var(--primary);width:13px;height:13px"> Select all
        </label>
      </div>
      <ul id="files-exp-list" class="flist"></ul>
      <div id="files-exp-footer" class="fpanel-footer"></div>
    </div>
 

   <!-- Gallery -->
<div id="fpanel-gallery" class="fpanel" hidden>
  <div id="files-gallery-dz" class="fmini-dz"
       onclick="SnaraFiles.instance._triggerInput('files-img-input')">
    <i data-icon="photo"></i>
    <p>Drop images &amp; videos here, or click to browse</p>
  </div>
  <input type="file" id="files-img-input"
         accept="image/*,video/mp4,video/webm,video/ogg,video/quicktime,.m4v"
         multiple hidden>

  <div class="gallery-scroll">
    <div id="gallery-grid" class="gallery-grid"></div>
  </div>
</div>

<!-- Files (share) -->
    <div id="fpanel-share" class="fpanel" hidden>

      <div id="fm-dropzone">
        <i data-icon="upload"></i>
        <p>Drop any file here</p>
        <span>or click to browse</span>
      </div>
      <input type="file" id="fm-input" multiple hidden>

      <ul id="fm-list" class="flist"></ul>

      <div id="fm-editor" hidden>
        <div class="fm-editor-bar">
          <span id="fm-editor-filename" class="fm-editor-filename"></span>
          <span id="fm-editor-status"   class="fm-editor-status"></span>
        </div>
        <div class="fm-editor-body">
          <textarea id="fm-textarea" spellcheck="false"></textarea>
          <div id="fm-preview" hidden></div>
        </div>
      </div>

    </div>
	
    <!-- Cache -->
    <div id="fpanel-cache" class="fpanel" hidden>
      <div class="fpanel-hint">Auto-generated files. Rebuild to refresh indexes.</div>
      <ul id="files-cache-list" class="flist"></ul>
      <div id="files-delete-bar-cache" class="fdelete-bar" hidden>
        <p id="files-delete-count-cache"></p>
        <div class="fdelete-actions">
          <button class="btn-mini mute" onclick="SnaraFiles.instance.clearDeletes('cache')">Cancel</button>
          <button class="btn-mini danger" onclick="SnaraFiles.instance.applyDeletes('cache')">Delete marked</button>
        </div>
      </div>
      <div class="fpanel-footer">
        <button class="btn-mini mute" onclick="SnaraFiles.instance.rebuildCache()">
          <i data-icon="refresh"></i> Rebuild cache
        </button>
      </div>
    </div>

  </div>
</div>
