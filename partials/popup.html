<div class="popup-toolbar" id="popup">
  <button class="pop-pill act"     onclick="setEntryClass('act')">A</button>
  <button class="pop-pill chapter" onclick="setEntryClass('chapter')">C</button>
  <button class="pop-pill scene"   onclick="setEntryClass('scene')">S</button>
  <button class="pop-pill beat"    onclick="setEntryClass('beat')">B</button>
  <div class="pop-sep"></div>
  <button class="pop-pill pop-remove" onclick="removeEntry()" title="Delete entry">✕</button>
</div>
