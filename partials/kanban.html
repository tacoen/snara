
<div
  id="kanban-root"
  class="kanban"
  data-bookid=""
  data-api="/api.php"
>
  <header class="kanban__header">
    <div class="kanban__header-left">
      <i data-icon='layout-kanban'></i>
	  <span class="kanban__title">Story Board</span>
      <span class="kanban__count" id="kanban-card-count">0 scenes</span>
    </div>
    <div class="kanban__header-right">
      <button class="btn btn-primary kanban__add-btn" id="kanban-add-btn">

  <div class="kanban__board" id="kanban-board" role="list">

    <div class="kanban__quick-actions">
      <button class="btn btn-primary kanban__quick-save" id="kanban-quick-save">Add</button>
